<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CourtBeat — live court pulse</title>
<meta name="description" content="Live pickleball court occupancy. Is it worth driving to the court right now?" />
<style>
  :root { --teal:#0E7C66; --optic:#C4D60A; --field:#FBFAF6; --ink:#10221E; --ink-soft:#4A5A55; --line:#E7E9E2; }
  * { box-sizing:border-box; margin:0; padding:0 }
  body { font-family:system-ui,-apple-system,sans-serif; background:var(--field); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 20px; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:800; font-size:20px; letter-spacing:-.02em }
  .brand .ball { width:20px; height:20px; border-radius:50%; background:radial-gradient(circle at 34% 30%, #DCEE2E, var(--optic) 70%) }
  .brand span { color:var(--teal) }
  h1 { font-size:19px; margin-top:26px; font-weight:700; letter-spacing:-.01em; text-align:center }
  .hours { color:var(--ink-soft); font-size:13px; margin-top:3px }
  .gauge { width:220px; height:184px; position:relative; margin-top:18px }
  .gauge svg { width:220px; height:220px; position:absolute; top:-2px; left:0 }
  .center { position:absolute; inset:0; height:184px; display:flex; flex-direction:column; align-items:center; justify-content:center }
  .pct { font-size:56px; font-weight:800; line-height:.9; letter-spacing:-.04em }
  .pct sup { font-size:22px; vertical-align:10px }
  .sub { font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-top:4px }
  .livedot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#E4572E;
    margin-right:5px; animation:beat 1.5s ease-in-out infinite }
  @keyframes beat { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.5} }
  .tag { margin-top:2px; font-size:13px; font-weight:700; padding:6px 14px; border-radius:20px; background:#EEF0EC; color:#5A6863 }
  .cta { margin-top:34px; text-align:center; max-width:300px }
  .cta p { font-size:14px; color:var(--ink-soft); line-height:1.45 }
  .badges { display:flex; gap:10px; margin-top:14px; justify-content:center }
  .badge { display:block; padding:11px 18px; border-radius:12px; background:var(--ink); color:#fff;
    font-size:13px; font-weight:700; text-decoration:none }
  footer { margin-top:auto; padding-top:30px; font-size:11px; color:#7C8A86 }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
</style>
</head>
<body>
  <div class="brand"><div class="ball"></div>court<span>beat</span></div>
  <h1 id="name">…</h1>
  <div class="hours" id="hours"></div>
  <div class="gauge">
    <svg viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="92" fill="none" stroke="#EDEFEA" stroke-width="18"
        stroke-linecap="round" stroke-dasharray="471.2 628.3" transform="rotate(135 110 110)" pathLength="628.3"/>
      <circle id="fill" cx="110" cy="110" r="92" fill="none" stroke="#7C8A86" stroke-width="18"
        stroke-linecap="round" stroke-dasharray="471.2 628.3" stroke-dashoffset="471.2" pathLength="628.3"
        transform="rotate(135 110 110)" style="transition:stroke-dashoffset 1.2s cubic-bezier(.2,.7,.2,1),stroke .5s"/>
    </svg>
    <div class="center">
      <div class="pct"><span id="pct">0</span><sup>%</sup></div>
      <div class="sub"><span class="livedot"></span>live · <span id="count">—</span></div>
    </div>
  </div>
  <div class="tag" id="tag">loading…</div>
  <div class="cta">
    <p>Download <b>CourtBeat</b> to check in and see who's playing.</p>
    <div class="badges">
      <a class="badge" href="https://apps.apple.com/app/courtbeat" rel="noopener">App&nbsp;Store</a>
      <a class="badge" href="https://play.google.com/store/apps/details?id=com.courtbeat.app" rel="noopener">Google&nbsp;Play</a>
    </div>
  </div>
  <footer>the live pulse of your courts</footer>
  <script src="/c/app.js" defer></script>
</body>
</html>
